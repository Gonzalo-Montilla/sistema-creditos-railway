<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CREDIFLOW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --finance-bg: #f3f6fb;
            --finance-surface: #ffffff;
            --finance-border: #dbe5f3;
            --finance-text: #0f172a;
            --finance-text-muted: #5b6b83;
            --finance-primary: #1d4ed8;
            --finance-primary-2: #0f3ea9;
            --finance-shadow-sm: 0 10px 28px rgba(15, 23, 42, 0.12);
        }

        body {
            background:
                radial-gradient(circle at 12% 15%, rgba(29, 78, 216, 0.10) 0, transparent 42%),
                radial-gradient(circle at 90% 85%, rgba(15, 62, 169, 0.10) 0, transparent 36%),
                var(--finance-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }
        
        .login-container {
            background: var(--finance-surface);
            padding: 2rem 1.8rem;
            border-radius: 18px;
            border: 1px solid var(--finance-border);
            box-shadow: var(--finance-shadow-sm);
            width: 100%;
            max-width: 420px;
        }
        
        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(120deg, #1d4ed8, #0f3ea9);
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 0.9rem;
            box-shadow: 0 10px 20px rgba(29, 78, 216, 0.25);
        }
        
        .brand-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            color: #153268;
            margin-bottom: 0.2rem;
            letter-spacing: -0.6px;
            line-height: 1.1;
        }
        
        .login-subtitle {
            color: var(--finance-text-muted);
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .field-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #334761;
            margin-bottom: 0.4rem;
            display: block;
        }

        .form-control {
            border: 1px solid #cfdcf0;
            border-radius: 10px;
            min-height: 46px;
            padding: 0.65rem 0.8rem;
            color: var(--finance-text);
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control:focus {
            border-color: #7ea6ef;
            box-shadow: 0 0 0 0.2rem rgba(29, 78, 216, 0.15);
        }

        .input-group .btn {
            border: 1px solid #cfdcf0;
            border-left: none;
            background: #fff;
            color: #3c5578;
            border-radius: 0 10px 10px 0;
            min-width: 48px;
        }

        .input-group .btn:hover {
            background: #f3f7ff;
            color: #1d4ed8;
        }

        .input-group .form-control {
            border-right: none;
            border-radius: 10px 0 0 10px;
        }
        
        .btn-login {
            background: linear-gradient(120deg, var(--finance-primary), var(--finance-primary-2));
            border: none;
            border-radius: 10px;
            padding: 0.75rem 0;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 0.75rem;
            min-height: 46px;
            letter-spacing: 0.01em;
        }
        
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.25);
            background: linear-gradient(120deg, #1e40af, #1e3a8a);
        }
        
        .alert {
            border-radius: 12px;
            border: 1px solid #f2c0c5;
            padding: 0.75rem 0.9rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .login-footer-note {
            text-align: center;
            margin-top: 1.1rem;
            color: var(--finance-text-muted);
            font-size: 0.79rem;
            font-weight: 500;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 1.35rem 1rem;
                border-radius: 14px;
            }

            .brand-title {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="text-center">
            <div class="login-logo">
                <i class="fas fa-coins"></i>
            </div>
            <h1 class="brand-title">CREDIFLOW</h1>
            <h2 class="login-subtitle">Sistema de Créditos y Cobros</h2>
        </div>
        
        {% if error %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="field-label" for="username"><i class="fas fa-user me-1"></i>Usuario</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            
            <div class="mb-3">
                <label class="field-label" for="password"><i class="fas fa-lock me-1"></i>Contraseña</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                    <button class="btn" type="button" id="togglePassword" aria-label="Mostrar contraseña">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>
        
        <div class="login-footer-note">
            <i class="fas fa-shield-alt me-1"></i> Acceso seguro al sistema
        </div>
    </div>
    <script>
        (function () {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            if (!toggleBtn || !passwordInput) return;

            toggleBtn.addEventListener('click', function () {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-eye', !isPassword);
                    icon.classList.toggle('fa-eye-slash', isPassword);
                }
                toggleBtn.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
            });
        })();
    </script>
</body>
</html>
